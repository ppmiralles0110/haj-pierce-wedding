{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<section class="auth-section" aria-label="Server error">
  <div class="auth-card text-center animate-on-scroll">
    <p class="eyebrow">500</p>
    <h1 class="auth-title">Something Went Wrong</h1>
    <p style="color:var(--color-text-secondary);margin:16px 0 32px;">
      We encountered an error. Please try again shortly.
    </p>
    <a href="{{ url_for('main.home') }}" class="btn btn--primary">Back to Home</a>
  </div>
</section>
{% endblock %}
