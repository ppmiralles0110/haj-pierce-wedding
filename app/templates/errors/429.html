{% extends "base.html" %}
{% block title %}Too Many Requests{% endblock %}
{% block content %}
<section class="auth-section" aria-label="Rate limit error">
  <div class="auth-card text-center animate-on-scroll">
    <p class="eyebrow">429</p>
    <h1 class="auth-title">Slow Down</h1>
    <p style="color:var(--color-text-secondary);margin:16px 0 32px;">
      Too many requests. Please wait a moment and try again.
    </p>
    <a href="{{ url_for('auth.login') }}" class="btn btn--ghost">Back to Login</a>
  </div>
</section>
{% endblock %}
