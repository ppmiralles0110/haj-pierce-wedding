# =============================================================================
# .github/workflows/deploy.yml — Deploy to Azure App Service
# Triggered automatically after the CI workflow passes on main
# =============================================================================
name: Deploy to Azure

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy (App Service)
    runs-on: ubuntu-latest
    # Only deploy when CI succeeded — skip on CI failure or cancellation
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: production
      url: https://${{ secrets.AZURE_APP_NAME }}.azurewebsites.net

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          package: .
          # DB migrations run automatically via the App Service startup command:
          # flask db upgrade && gunicorn --bind=0.0.0.0:8000 --workers 2 wsgi:application

      - name: Health check
        run: |
          URL="https://${{ secrets.AZURE_APP_NAME }}.azurewebsites.net/health"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" == "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1
