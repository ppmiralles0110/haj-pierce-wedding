# =============================================================================
# .github/workflows/deploy.yml — Deploy to Azure App Service on push to main
# Runs after CI passes
# =============================================================================
name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy (App Service)
    runs-on: ubuntu-latest
    needs: []   # Deployment only runs when CI passes via branch protection

    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}    # Set in GitHub secrets
          package: .

      - name: Run database migrations
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp ssh --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ secrets.AZURE_APP_NAME }} \
              --command "flask db upgrade"
        env:
          FLASK_APP: wsgi.py

      - name: Health check
        run: |
          URL="https://${{ steps.deploy.outputs.webapp-url }}/health"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" == "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1
